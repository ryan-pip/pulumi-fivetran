version: "2"

linters:
  default: none
  enable:
    # Core correctness
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Style / quality
    - goconst
    - lll
    - misspell
    - nakedret
    - unconvert
    # Security
    - gosec
    # Replaces golint / interfacer (removed in golangci-lint v1.57+)
    - revive
  settings:
    goconst:
      # Tests legitimately repeat resource-name literals across expectedResources
      # and resourcesWithCustomComputeID; without this each name reaches the
      # default min-occurrences=3 across files and trips the linter.
      ignore-tests: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - schema.go
      - pulumiManifest.go
      # cmd/ depends on schema-embed.json generated at build time;
      # entry point has no logic to lint.
      - cmd

run:
  timeout: 20m
