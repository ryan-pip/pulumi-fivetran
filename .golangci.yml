linters:
  enable:
    # Core correctness checks
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    # Style / quality
    - goconst
    - gofmt
    - lll
    - misspell
    - nakedret
    - unconvert
    # Security
    - gosec
    # Replacements for removed linters:
    # - staticcheck replaces megacheck
    # - unused replaces deadcode/structcheck/varcheck
    # - revive replaces golint/interfacer
    - unused
    - revive
  enable-all: false
run:
  skip-files:
    - schema.go
    - pulumiManifest.go
  timeout: 20m
