version: "2"

linters:
  enable:
    # Core correctness (also enabled by default in v2, listed explicitly for clarity)
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Style / quality
    - goconst
    - lll
    - misspell
    - nakedret
    - unconvert
    # Security
    - gosec
    # Replaces golint / interfacer (removed in golangci-lint v1.57+)
    - revive
  enable-all: false

issues:
  exclude-files:
    - schema.go
    - pulumiManifest.go
  # cmd/ packages depend on schema-embed.json which is generated at build time.
  # Lint only the library packages; cmd/ is a thin entry-point with no logic to lint.
  exclude-dirs:
    - cmd

run:
  timeout: 20m
