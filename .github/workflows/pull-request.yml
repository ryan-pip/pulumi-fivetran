
name: build

on:
  pull_request:
    paths-ignore:
      - docs
      - .devcontainer
      - examples

jobs:
  build_sdk:
    name: build_sdk
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        dotnetversion:
          - 8.0.x
        goversion:
          - 1.23.x
        nodeversion:
          - 20.x
        pythonversion:
          - "3.11"
        javaversion:
          - "11"
        language:
          - nodejs
          - python
          # - dotnet
          - go
          # - java

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Unshallow clone for tags
      run: git fetch --prune --unshallow --tags
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{matrix.goversion}}

    - name: Install pulumictl
      uses: jaxxstorm/action-install-gh-release@v1.11.0
      with:
        repo: pulumi/pulumictl

    - name: Install pulumi
      uses: pulumi/actions@v5

    - if: ${{ matrix.language == 'nodejs'}}
      name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{matrix.nodeversion}}
        registry-url: https://registry.npmjs.org

    - if: ${{ matrix.language == 'dotnet'}}
      name: Setup DotNet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{matrix.dotnetversion}}

    - if: ${{ matrix.language == 'python'}}
      name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{matrix.pythonversion}}

    - if: ${{ matrix.language == 'java'}}
      name: Setup Java
      uses: actions/setup-java@v4
      with:
        cache: gradle
        distribution: temurin
        java-version: ${{matrix.javaversion}}

    - name: Build SDK
      run: make build_${{ matrix.language }}

    - name: Check worktree clean
      run: |
        git update-index -q --refresh
        if ! git diff-files --quiet; then
            >&2 echo "error: working tree is not clean, aborting!"
            git status
            git diff
            exit 1
        fi

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.x

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.5.0
          working-directory: provider
          # Lint library packages only; cmd/ depends on schema-embed.json which is generated at build time.
          args: --path-prefix provider -c ../.golangci.yml . ./pkg/...

  unit_test:
    name: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.x

      - name: go vet
        # Exclude cmd/ packages: they embed schema-embed.json which is generated at build time.
        run: cd provider && go vet . ./pkg/...

      - name: go test
        # Exclude cmd/ packages for the same reason (schema-embed.json not present without make generate).
        run: cd provider && go test -v -short -parallel 10 . ./pkg/...

  schema_validation:
    name: schema-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Validate schema is valid JSON
        run: |
          jq . provider/cmd/pulumi-resource-fivetran/schema.json > /dev/null
          echo "Schema JSON is valid"

      - name: Check schema resource count
        run: |
          COUNT=$(jq '.resources | length' provider/cmd/pulumi-resource-fivetran/schema.json)
          echo "Schema contains $COUNT resources"
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: Schema has zero resources - something went wrong with generation"
            exit 1
          fi
