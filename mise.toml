[settings]
experimental = true
fetch_remote_versions_cache = "24h"
http_retries = 3
lockfile = true

[tools]
go = "1.25"
node = "24.17.0" # Exact pin: keeps upgrade-provider's `mise upgrade` from reinstalling node (gpg verify fails on CI runners).
python = "3.11"
dotnet = "8.0"

pulumi = "3"
uv = "latest"
golangci-lint = "2"
"go:github.com/pulumi/pulumictl/cmd/pulumictl" = "latest"

[env]
GOTOOLCHAIN = "go1.25.9"
