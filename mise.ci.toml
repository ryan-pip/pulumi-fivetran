# CI-only mise config. The full dev tool set lives in mise.toml; this file is
# the trimmed subset GitHub Actions installs via .github/actions/setup-mise.
# Keep tool versions in sync with mise.toml for everything listed here.
#
# Excluded vs. mise.toml: java (no SDK matrix entry), gopls (IDE language
# server), pulumi/upgrade-provider (only used by upgrade-provider.yml, which
# calls pulumi-upgrade-provider-action and doesn't go through mise).

[settings]
experimental = true
fetch_remote_versions_cache = "24h"
http_retries = 3

[tools]
github-cli = "latest"

go = "1.25"
node = "22"
python = "3.11"
dotnet = "8.0"

pulumi = "latest"
uv = "latest"
golangci-lint = "2"
"go:github.com/pulumi/pulumictl/cmd/pulumictl" = "latest"

[env]
GOTOOLCHAIN = "go1.25.9"
